services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - ${VAULTWARDEN_DATA_VOLUME}:/data
    networks:
      - vaultwarden_proxy

networks:
  vaultwarden_proxy:
    name: vaultwarden_proxy_network
    external: true
