services:
  vaultwarden:
    image: vaultwarden/server:1.35.4
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=${VAULTWARDEN_DOMAIN}
      - ADMIN_TOKEN_FILE=/run/secrets/admin_token
    volumes:
      - ${VAULTWARDEN_DATA_VOLUME}:/data
      - ./secrets/admin_token:/run/secrets/admin_token:ro
    networks:
      - vaultwarden_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${VAULTWARDEN_MEMORY_LIMIT:-256m}
    security_opt:
      - no-new-privileges:true

networks:
  vaultwarden_proxy:
    name: vaultwarden_proxy_network
    external: true
