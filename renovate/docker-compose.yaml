services:
  # This is a one-shot container: it runs Renovate, checks for dependency updates, and exits.
  # It is invoked by a cron job rather than running continuously.
  renovate:
    image: ghcr.io/renovatebot/renovate:43.46.2
    container_name: renovate
    entrypoint: ["sh", "-c", "RENOVATE_TOKEN=$$(cat /run/secrets/forgejo_token) renovate"]
    environment:
      - RENOVATE_PLATFORM=forgejo
      - RENOVATE_ENDPOINT=${FORGEJO_URL}
      - RENOVATE_REPOSITORIES=${RENOVATE_REPOSITORIES}
      - LOG_LEVEL=info
    volumes:
      - ./secrets/forgejo_token:/run/secrets/forgejo_token:ro
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${RENOVATE_MEMORY_LIMIT:-512m}
        reservations:
          memory: ${RENOVATE_MEMORY_RESERVATION:-64m}
