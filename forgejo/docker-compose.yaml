services:
  forgejo_app:
    image: codeberg.org/forgejo/forgejo:14.0.3
    container_name: forgejo_app
    restart: unless-stopped
    depends_on:
      forgejo_postgres:
        condition: service_healthy
    ports:
      - "${HOST_LAN_IP}:${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${HOST_LAN_IP}:${FORGEJO_SSH_PORT:-2222}:22"
    environment:
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo_postgres:5432
      - FORGEJO__database__NAME=${POSTGRES_DB}
      - FORGEJO__database__USER=${POSTGRES_USER}
      - FORGEJO__database__PASSWD__FILE=/run/secrets/postgres_password
    volumes:
      - ${FORGEJO_DATA_VOLUME}:/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - forgejo
      - forgejo_proxy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${FORGEJO_APP_MEMORY_LIMIT:-512m}

  forgejo_postgres:
    image: postgres:17.8-alpine3.23
    container_name: forgejo_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - ${FORGEJO_DB_VOLUME}:/var/lib/postgresql/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - forgejo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${FORGEJO_POSTGRES_MEMORY_LIMIT:-1g}

networks:
  forgejo:
    name: forgejo_network
    driver: bridge
  forgejo_proxy:
    name: forgejo_proxy_network
    external: true
