services:
  nextcloud_app:
    image: nextcloud:33.0.0 # update both app and notify_push to the same version when upgrading
    container_name: nextcloud_app
    restart: unless-stopped
    depends_on:
      nextcloud_postgres:
        condition: service_healthy
      nextcloud_redis:
        condition: service_healthy
    ports:
      - ${NEXTCLOUD_LAN_PORT:-8888}:80 #so the instance can be accessed without the use of cloudflare tunnel in the LAN
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_HOST=${POSTGRES_HOST}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_HOST_PASSWORD_FILE=/run/secrets/redis_password
      - OVERWRITEPROTOCOL=https
      - TRUSTED_PROXIES=${NEXTCLOUD_PROXY_NETWORK_SUBNET:-172.28.0.0/24} # Subnet of nextcloud_proxy_network
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/admin_password
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - NEXTCLOUD_PRIMARY_DOMAIN=${NEXTCLOUD_PRIMARY_DOMAIN}
      - NEXTCLOUD_DATA_DIR=${NEXTCLOUD_DATA_DIR}
      - NEXTCLOUD_LAN_PORT=${NEXTCLOUD_LAN_PORT}
      - DEFAULT_PHONE_REGION=${DEFAULT_PHONE_REGION}
      - MAINTENANCE_WINDOW_START=${MAINTENANCE_WINDOW_START}
      - NEXTCLOUD_APPS=${NEXTCLOUD_APPS}
      - HP_SHARED_KEY=${HP_SHARED_KEY}
      - HP_TRUSTED_PROXY_IPS=${NEXTCLOUD_INTERNAL_NETWORK_SUBNET:-172.29.0.0/24}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_NAME=${SMTP_NAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_DOMAIN=${MAIL_DOMAIN}
      - TALK_STUN_SERVER=${TALK_STUN_SERVER}
      - TALK_TURN_SERVER=${TALK_TURN_SERVER}
      - TALK_TURN_SCHEMES=${TALK_TURN_SCHEMES}
      - TALK_TURN_PROTOCOLS=${TALK_TURN_PROTOCOLS}
      - TALK_TURN_SECRET=${TALK_TURN_SECRET}
      - TALK_SIGNALING_SERVER=${TALK_SIGNALING_SERVER}
      - TALK_SIGNALING_SECRET=${TALK_SIGNALING_SECRET}
      - COLLABORA_URL=${COLLABORA_URL}
      - COLLABORA_WOPI_ALLOWLIST=${COLLABORA_WOPI_ALLOWLIST}
      - WHITEBOARD_JWT_SECRET=${WHITEBOARD_JWT_SECRET}
      - WHITEBOARD_PUBLIC_URL=${WHITEBOARD_PUBLIC_URL}
      - COMPOSE_PROFILES=${COMPOSE_PROFILES}
      - TZ=${TIMEZONE}
    volumes:
      - ${NEXTCLOUD_APP_VOLUME}:/var/www/html
      - ${NEXTCLOUD_DATA_VOLUME}:${NEXTCLOUD_DATA_DIR} #https://docs.nextcloud.com/server/latest/admin_manual/installation/harden_server.html#place-data-directory-outside-of-the-web-root
      - ${NEXTCLOUD_HOOKS_VOLUME}/post-installation:/docker-entrypoint-hooks.d/post-installation:ro
      - ${NEXTCLOUD_HOOKS_VOLUME}/before-starting:/docker-entrypoint-hooks.d/before-starting:ro
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
      - ./secrets/admin_password:/run/secrets/admin_password:ro
      - ./secrets/redis_password:/run/secrets/redis_password:ro
    networks:
      - nextcloud
      - nextcloud_proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 600s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_APP_MEMORY_LIMIT:-4g}
        reservations:
          memory: ${NEXTCLOUD_APP_MEMORY_RESERVATION:-64m}

  nextcloud_postgres: #AIO uses postgres, so this instance should too
    image: postgres:17.8-alpine3.23
    container_name: nextcloud_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - ${NEXTCLOUD_DB_VOLUME}:/var/lib/postgresql/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_POSTGRES_MEMORY_LIMIT:-1g}
        reservations:
          memory: ${NEXTCLOUD_POSTGRES_MEMORY_RESERVATION:-64m}

  nextcloud_redis:
    image: redis:8.6.1-alpine3.23
    container_name: nextcloud_redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass $$(cat /run/secrets/redis_password) --save 60 1000 --appendonly yes"]
    volumes:
      - ./secrets/redis_password:/run/secrets/redis_password:ro
      - ${NEXTCLOUD_REDIS_VOLUME}:/data
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_REDIS_MEMORY_LIMIT:-256m}
        reservations:
          memory: ${NEXTCLOUD_REDIS_MEMORY_RESERVATION:-64m}

  nextcloud_notify_push:
    image: nextcloud:33.0.0
    container_name: nextcloud_notify_push
    entrypoint: ["/scripts/notify_push_entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      nextcloud_app:
        condition: service_healthy
    environment:
      - PORT=7867
      - NEXTCLOUD_URL=http://nextcloud_app
    volumes:
      - ${NEXTCLOUD_APP_VOLUME}/custom_apps:/var/www/html/custom_apps:ro
      - ${NEXTCLOUD_APP_VOLUME}/config:/var/www/html/config:ro
      - ./scripts/notify_push_entrypoint.sh:/scripts/notify_push_entrypoint.sh:ro
    networks:
      - nextcloud_proxy
      - nextcloud
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_NOTIFY_PUSH_MEMORY_LIMIT:-256m}
        reservations:
          memory: ${NEXTCLOUD_NOTIFY_PUSH_MEMORY_RESERVATION:-64m}

  nextcloud_imaginary:
    image: nextcloud/aio-imaginary:20260218_123804
    container_name: nextcloud_imaginary
    restart: unless-stopped
    profiles: [imaginary]
    cap_add:
      - SYS_NICE # required for HEIC preview generation
    environment:
      - PORT=9000
    networks:
      - nextcloud
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_IMAGINARY_MEMORY_LIMIT:-512m}
        reservations:
          memory: ${NEXTCLOUD_IMAGINARY_MEMORY_RESERVATION:-64m}

  nextcloud_whiteboard:
    image: ghcr.io/nextcloud-releases/whiteboard:v1.5.6
    container_name: nextcloud_whiteboard
    restart: unless-stopped
    profiles: [whiteboard]
    environment:
      - NEXTCLOUD_URL=http://nextcloud_app
      - JWT_SECRET_KEY=${WHITEBOARD_JWT_SECRET}
    networks:
      - nextcloud_proxy
      - nextcloud
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_WHITEBOARD_MEMORY_LIMIT:-256m}
        reservations:
          memory: ${NEXTCLOUD_WHITEBOARD_MEMORY_RESERVATION:-64m}

  nextcloud_elasticsearch:
    image: nextcloud/aio-fulltextsearch:20260218_123804
    container_name: nextcloud_elasticsearch
    restart: unless-stopped
    profiles: [fulltextsearch]
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-512m} -Xmx${ES_HEAP_SIZE:-512m}"
      - xpack.security.enabled=false
      - TZ=${TIMEZONE}
    volumes:
      - ${ELASTICSEARCH_DATA_VOLUME}:/usr/share/elasticsearch/data
    networks:
      - nextcloud
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_ELASTICSEARCH_MEMORY_LIMIT:-1g}
        reservations:
          memory: ${NEXTCLOUD_ELASTICSEARCH_MEMORY_RESERVATION:-64m}

  nextcloud_clamav:
    image: clamav/clamav:1.5.1-27_base
    container_name: nextcloud_clamav
    restart: unless-stopped
    profiles: [clamav]
    volumes:
      - ${CLAMAV_DB_VOLUME}:/var/lib/clamav
    networks:
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "printf 'PING' | nc -w1 localhost 3310 | grep -q PONG"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s  # ClamAV downloads ~300MB of definitions on first start
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_CLAMAV_MEMORY_LIMIT:-3g}
        reservations:
          memory: ${NEXTCLOUD_CLAMAV_MEMORY_RESERVATION:-64m}

  nextcloud_harp:
    image: ghcr.io/nextcloud/nextcloud-appapi-harp:v0.3.2
    container_name: nextcloud_harp
    hostname: appapi-harp
    restart: unless-stopped
    profiles: [harp]
    depends_on:
      nextcloud_app:
        condition: service_healthy
    environment:
      - HP_SHARED_KEY=${HP_SHARED_KEY}
      - NC_INSTANCE_URL=http://nextcloud_app
      - HP_TRUSTED_PROXY_IPS=${NEXTCLOUD_INTERNAL_NETWORK_SUBNET:-172.29.0.0/24}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HARP_CERTS_VOLUME}:/certs
    ports:
      - ${HOST_LAN_IP}:8780:8780
      - ${HOST_LAN_IP}:8782:8782
    networks:
      - nextcloud
      - exapps
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NEXTCLOUD_HARP_MEMORY_LIMIT:-512m}
        reservations:
          memory: ${NEXTCLOUD_HARP_MEMORY_RESERVATION:-64m}

networks:
  nextcloud:
    name: nextcloud_network
    driver: bridge
    ipam:
      config:
        - subnet: ${NEXTCLOUD_INTERNAL_NETWORK_SUBNET:-172.29.0.0/24} # Fixed subnet used by HP_TRUSTED_PROXY_IPS
  nextcloud_proxy:
    name: nextcloud_proxy_network
    external: true
  exapps:
    name: exapps_network
    driver: bridge
