services:
  gitea_app:
    image: gitea/gitea:1.25.4
    container_name: gitea_app
    restart: unless-stopped
    depends_on:
      gitea_postgres:
        condition: service_healthy
    ports:
      - "${HOST_LAN_IP}:${GITEA_HTTP_PORT:-3000}:3000"
      - "${HOST_LAN_IP}:${GITEA_SSH_PORT:-2222}:22"
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=gitea_postgres:5432
      - GITEA__database__NAME=${POSTGRES_DB}
      - GITEA__database__USER=${POSTGRES_USER}
      - GITEA__database__PASSWD__FILE=/run/secrets/postgres_password
    volumes:
      - ${GITEA_DATA_VOLUME}:/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - gitea
      - gitea_proxy
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${GITEA_APP_MEMORY_LIMIT:-512m}

  gitea_postgres:
    image: postgres:17.8-alpine3.23
    container_name: gitea_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - ${GITEA_DB_VOLUME}:/var/lib/postgresql/data
      - ./secrets/postgres_password:/run/secrets/postgres_password:ro
    networks:
      - gitea
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${GITEA_POSTGRES_MEMORY_LIMIT:-1g}

networks:
  gitea:
    name: gitea_network
    driver: bridge
  gitea_proxy:
    name: gitea_proxy_network
    external: true
