services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.14.0
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${HOST_LAN_IP}:81:81" # Admin panel - LAN access only
    environment:
      - DISABLE_IPV6=true # Set to false if IPv6 is enabled on your host
    volumes:
      - ${NPM_DATA_VOLUME}:/data
      - ${NPM_LETSENCRYPT_VOLUME}:/etc/letsencrypt
    networks:
      - tunnel
      - nextcloud_proxy
      - gitea_proxy
      - vaultwarden_proxy
      - uptime_kuma_proxy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${NPM_MEMORY_LIMIT:-256m}

  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    container_name: cloudflared
    command: tunnel run
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tunnel
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${CLOUDFLARED_MEMORY_LIMIT:-128m}

networks:
  tunnel:
    name: tunnel_network
    driver: bridge
  nextcloud_proxy:
    name: nextcloud_proxy_network
    external: true
  gitea_proxy:
    name: gitea_proxy_network
    external: true
  vaultwarden_proxy:
    name: vaultwarden_proxy_network
    external: true
  uptime_kuma_proxy:
    name: uptime_kuma_proxy_network
    external: true
