repositories:
  - path: "${BORGBASE_REPO}"
    label: borgbase

source_directories:
  - /mnt/nextcloud-app    # backup/docker-compose.yaml: NEXTCLOUD_APP_VOLUME
  - /mnt/nextcloud-data   # backup/docker-compose.yaml: NEXTCLOUD_DATA_VOLUME
  - /mnt/gitea-data       # backup/docker-compose.yaml: GITEA_DATA_VOLUME
  - /mnt/vaultwarden-data # backup/docker-compose.yaml: VAULTWARDEN_DATA_VOLUME

postgresql_databases:
  - name: "${NEXTCLOUD_DB}"
    hostname: nextcloud_postgres
    username: "${NEXTCLOUD_DB_USER}"
  - name: "${GITEA_DB}"
    hostname: gitea_postgres
    username: "${GITEA_DB_USER}"

encryption_passphrase: "${BORG_PASSPHRASE}"

retention:
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 3
