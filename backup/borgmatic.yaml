repositories:
  - path: "${BORGBASE_REPO}"
    label: borgbase

source_directories:
  - /mnt/nextcloud-app
  - /mnt/nextcloud-data
  - /mnt/gitea-data
  - /mnt/vaultwarden-data

postgresql_databases:
  - name: "${NEXTCLOUD_DB}"
    hostname: nextcloud_postgres
    username: "${NEXTCLOUD_DB_USER}"
    password: "${NEXTCLOUD_DB_PASSWORD}"
  - name: "${GITEA_DB}"
    hostname: gitea_postgres
    username: "${GITEA_DB_USER}"
    password: "${GITEA_DB_PASSWORD}"

encryption_passphrase: "${BORG_PASSPHRASE}"

retention:
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 3
