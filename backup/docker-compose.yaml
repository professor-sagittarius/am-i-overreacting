services:
  # This is a one-shot container: it runs borgmatic, completes the backup, and exits.
  # It is invoked by backup.sh rather than running continuously.
  borgmatic:
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2
    container_name: borgmatic
    environment:
      - BORGBASE_REPO=${BORGBASE_REPO}
      - FILE__BORG_PASSPHRASE=/run/secrets/borg_passphrase
      - NEXTCLOUD_DB=${NEXTCLOUD_DB}
      - NEXTCLOUD_DB_USER=${NEXTCLOUD_DB_USER}
      - GITEA_DB=${GITEA_DB}
      - GITEA_DB_USER=${GITEA_DB_USER}
    volumes:
      - ./borgmatic.yaml:/etc/borgmatic.d/config.yaml:ro
      - ${SSH_KEY_PATH}:/root/.ssh/id_ed25519:ro
      - ${NEXTCLOUD_APP_VOLUME}:/mnt/nextcloud-app:ro
      - ${NEXTCLOUD_DATA_VOLUME}:/mnt/nextcloud-data:ro
      - ${GITEA_DATA_VOLUME}:/mnt/gitea-data:ro
      - ${VAULTWARDEN_DATA_VOLUME}:/mnt/vaultwarden-data
      - ${BORGMATIC_STATE_VOLUME}:/root/.borgmatic
      - ${BORG_CACHE_VOLUME}:/root/.cache/borg
      - ./secrets/pgpass:/root/.pgpass:ro
      - ./secrets/borg_passphrase:/run/secrets/borg_passphrase:ro
    networks:
      - nextcloud
      - gitea
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${BORGMATIC_MEMORY_LIMIT:-512m}

networks:
  nextcloud:
    name: nextcloud_network
    external: true
  gitea:
    name: gitea_network
    external: true
